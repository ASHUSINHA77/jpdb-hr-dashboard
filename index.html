<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Dashboard - Employee Record Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- JsonPowerDB Commons -->
    <script src="https://login2explore.com/jpdb/resources/js/0.0.4/jpdb-commons.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="logo-section">
                <svg class="logo-icon" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <h1>HR Dashboard</h1>
            </div>
            <p class="header-subtitle">Employee Record Management System</p>
        </div>
    </header>

    <!-- Main Container -->
    <main class="dashboard-container">
        <!-- Left Panel - Form -->
        <section class="form-panel">
            <div class="panel-header">
                <h2>Employee Record</h2>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Checking connection...</span>
                </div>
            </div>

            <form id="employeeForm" class="employee-form" novalidate>
                <!-- Employee ID -->
                <div class="form-group">
                    <label for="empId">
                        <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Employee ID
                    </label>
                    <div class="input-with-indicator">
                        <input 
                            type="text" 
                            id="empId" 
                            name="empId" 
                            placeholder="Enter Employee ID (e.g., EMP001)"
                            required
                            pattern="^[A-Za-z0-9_\-]+$"
                            autocomplete="off"
                        >
                        <span class="validation-icon" id="empIdIcon"></span>
                    </div>
                    <span class="error-message" id="empIdError"></span>
                </div>

                <!-- Employee Name -->
                <div class="form-group">
                    <label for="empName">
                        <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Employee Name
                    </label>
                    <div class="input-with-indicator">
                        <input 
                            type="text" 
                            id="empName" 
                            name="empName" 
                            placeholder="Enter full name"
                            required
                            autocomplete="off"
                        >
                        <span class="validation-icon" id="empNameIcon"></span>
                    </div>
                    <span class="error-message" id="empNameError"></span>
                </div>

                <!-- Salary -->
                <div class="form-group">
                    <label for="empSalary">
                        <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                        Salary (₹)
                    </label>
                    <div class="input-with-indicator">
                        <input 
                            type="number" 
                            id="empSalary" 
                            name="empSalary" 
                            placeholder="Enter salary in INR"
                            required
                            min="0"
                            step="100"
                            autocomplete="off"
                        >
                        <span class="validation-icon" id="empSalaryIcon"></span>
                    </div>
                    <span class="error-message" id="empSalaryError"></span>
                </div>

                <!-- Department -->
                <div class="form-group">
                    <label for="empDept">
                        <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                        Department
                    </label>
                    <div class="input-with-indicator">
                        <select id="empDept" name="empDept" required>
                            <option value="">-- Select Department --</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Human Resources">Human Resources</option>
                            <option value="Finance">Finance</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Operations">Operations</option>
                            <option value="IT Support">IT Support</option>
                            <option value="Product">Product</option>
                            <option value="Design">Design</option>
                            <option value="Legal">Legal</option>
                        </select>
                        <span class="validation-icon" id="empDeptIcon"></span>
                    </div>
                    <span class="error-message" id="empDeptError"></span>
                </div>

                <!-- Action Buttons -->
                <div class="form-actions">
                    <button type="button" id="btnSave" class="btn btn-primary" title="Save new employee record">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Save
                    </button>
                    <button type="button" id="btnUpdate" class="btn btn-warning" disabled title="Update existing employee record">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        Update
                    </button>
                    <button type="button" id="btnDelete" class="btn btn-danger" disabled title="Delete employee record">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            <line x1="10" y1="11" x2="10" y2="17"/>
                            <line x1="14" y1="11" x2="14" y2="17"/>
                        </svg>
                        Delete
                    </button>
                    <button type="button" id="btnReset" class="btn btn-outline" title="Clear form and reset">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                        Reset
                    </button>
                </div>
            </form>

            <!-- Toast Notification Container -->
            <div id="toastContainer" class="toast-container" aria-live="polite"></div>
        </section>

        <!-- Right Panel - Record Navigator -->
        <section class="nav-panel">
            <div class="panel-header">
                <h2>Record Navigator</h2>
            </div>

            <!-- Navigation Controls -->
            <div class="nav-controls">
                <button type="button" id="btnFirst" class="nav-btn" title="First Record">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="11 17 6 12 11 7"/>
                        <polyline points="18 17 13 12 18 7"/>
                    </svg>
                    <span>First</span>
                </button>
                <button type="button" id="btnPrev" class="nav-btn" title="Previous Record">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    <span>Previous</span>
                </button>
                <button type="button" id="btnNext" class="nav-btn" title="Next Record">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                    <span>Next</span>
                </button>
                <button type="button" id="btnLast" class="nav-btn" title="Last Record">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="13 17 18 12 13 7"/>
                        <polyline points="6 17 11 12 6 7"/>
                    </svg>
                    <span>Last</span>
                </button>
            </div>

            <!-- Record Display Card -->
            <div class="record-card" id="recordCard">
                <div class="record-card-placeholder">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <p>Use navigation buttons to browse records or enter an Employee ID to search</p>
                </div>
                <div class="record-card-data" id="recordCardData" style="display: none;">
                    <div class="record-field">
                        <span class="record-label">Employee ID</span>
                        <span class="record-value" id="recId">—</span>
                    </div>
                    <div class="record-field">
                        <span class="record-label">Name</span>
                        <span class="record-value" id="recName">—</span>
                    </div>
                    <div class="record-field">
                        <span class="record-label">Salary</span>
                        <span class="record-value" id="recSalary">—</span>
                    </div>
                    <div class="record-field">
                        <span class="record-label">Department</span>
                        <span class="record-value" id="recDept">—</span>
                    </div>
                </div>
                <div class="record-position" id="recordPosition" style="display: none;"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>Powered by <strong>JsonPowerDB</strong> — High-Performance Real-time Database Engine</p>
    </footer>

    <!-- Application Scripts -->
    <script src="js/config.js"></script>
    <script src="js/jpdb-helper.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v4513226cdae34746b4dedf0b4dfa099e1781791509496" integrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ==" data-cf-beacon='{"version":"2024.11.0","token":"3279d41ec7804124a29acc6e692f9a2b","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
